<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Form Inputs</title>
</head>
<body>
    <form>
        <fieldset>
           <center><legend><h1>details~form</h1></legend></center>
<input class="form-control"><br>
<div class="row">
    <div class="Col-md-6">
        <input type="text" class="form-control" placeholder="name">
</div>
<input type="text" class="form-control" placeholder="name"><br>
            <label>name:<br><input type="text" name="text"></label><br><br>
            <label>Password:<br><input type="password" name="password"></label><br><br>
            <label>Email:<br><input type="email" name="email"></label><br><br>
            <label>Tel:<br><input type="tel" name="tel"></label><br><br>
            <label>URL:<br><input type="url" name="url"></label><br><br>
            <label>Search:<br><input type="search" name="search"></label><br><br>
            <label>Number:<br><input type="number" name="number" min="0" max="100"></label><br><br>
            <label>Range:<br><input type="range" name="range" min="0" max="10"></label><br><br>
            <label>Date:<br><input type="date" name="date"></label><br><br>
            <label>Month:<br><input type="month" name="month"></label><br><br>
            <label>Week:<br><input type="week" name="week"></label><br><br>
            <label>Time:<br><input type="time" name="time"></label><br><br>
            <label>DateTime-local:<br><input type="datetime-local" name="datetime"></label><br><br>
            <label>Color:<br><input type="color" name="color"></label><br><br>
            <label>Checkbox:<br><input type="checkbox" name="checkbox" value="yes"> Yes</label><br><br>
            <label>Radio:<br>
                <input type="radio" name="radio" value="option1"> Option 1<br>
                <input type="radio" name="radio" value="option2"> Option 2
            </label><br><br>
            <label>File:<br><input type="file" name="file"></label><br><br>
            <input type="hidden" name="hidden" value="hiddenValue">
            <label>Button:<br><input type="button" value="Click me"></label><br><br>
            <label>Submit:<br><input type="submit" value="Submit"></label><br><br>
            <label>Reset:<br><input type="reset" value="Reset"></label><br><br>

            <label>Textarea:<br><textarea name="textarea" rows="4" cols="30"></textarea></label><br><br>
            <label>Select:<br>
                <select name="select">
                    <option value="">Choose</option>
                    <option value="1">Option 1</option>
                    <option value="2">Option 2</option>
                </select>
            </label>
        </fieldset>
    </form>
</body>
</html>
